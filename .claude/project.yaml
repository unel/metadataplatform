# Настройки флоу разработки
# transition: confirm — показать результат, ждать подтверждения пользователя
# transition: auto — выполнить и передать управление следующему шагу

# Уровень владения технологиями команды
# beginner    — простые идиомы, развёрнутые комментарии с объяснением почему
# intermediate — стандартные идиомы, комментарии для неочевидного
# advanced    — полностью идиоматичный код, минимум комментариев
proficiency:
  go: intermediate
  typescript: advanced
  sveltekit: intermediate
  css: advanced
  bun: beginner
  postgres: intermediate
  html: advanced

steps:
  # Функциональные требования — черновик всегда показываем, могут быть правки
  spec-ft:
    transition: confirm

  # Нефункциональные требования — аналогично, требуют осмысленного ввода
  spec-nft:
    transition: confirm

  # Ревью спеки — механическая проверка, результат идёт дальше автоматически
  spec-review:
    transition: auto

  # Acceptance criteria — показываем, чтобы согласовать что считается "готово"
  acceptance-write:
    transition: confirm

  # Ревью acceptance — механическая проверка
  acceptance-review:
    transition: auto
    max_retries: 5  # после 5 неудачных переделок — стоп, нужен человек

  # Тесты — показываем черновик, структура тестов требует согласования
  test-write:
    transition: confirm

  # Ревью тестов — механическая проверка
  test-review:
    transition: auto

  # Написание кода — запускаем автоматически, результат виден через build/test
  code-write:
    transition: auto
    max_retries: 3  # после 3 неудачных попыток — стоп, нужен человек

  # Сборка — автоматически, ошибки уходят обратно в code-write
  build:
    transition: auto
    max_retries: 2

  # Тесты — автоматически, провалы уходят обратно в code-write
  test-run:
    transition: auto
    max_retries: 3

  # Ревью кода — показываем результат, человек решает двигаться дальше или нет
  code-review:
    transition: confirm
    max_retries: 1

# Эскалация при повторных провалах ревью
# Применяется к любому шагу с max_retries.
# Счётчик iteration = сколько раз шаг уже провалился (1 = первый провал).
# Агент выбирает тон и глубину анализа по уровню эскалации.
retry_escalation:
  1:
    label: normal
    tone: |
      Стандартный разбор: что именно не так, как исправить.
      Тон рабочий, конструктивный.
  2:
    label: attentive
    tone: |
      Вторая попытка. Агент явно проговаривает: "мы уже пробовали — вот что не сработало".
      Анализирует не только текущие проблемы, но и паттерн между первым и вторым провалом.
      Тон собранный, без паники, но с акцентом на повторяемость.
  3:
    label: concerned
    tone: |
      Третья попытка. Агент ставит под сомнение не только артефакт, но и подход.
      Явно спрашивает себя: "проблема в спеке, или мы не понимаем задачу?".
      Предлагает гипотезы о корневой причине цикла. Тон серьёзный.
  4:
    label: alarmed
    tone: |
      Четвёртая попытка. Агент делает полный ретроспективный анализ всех трёх провалов:
      таблица "что пробовали / что получили / почему снова не то".
      Формулирует явную рекомендацию — возможно нужен рефакторинг подхода или эскалация.
      Тон тревожный, но структурированный.
  5:
    label: final
    tone: |
      Последняя попытка перед стопом. Агент предупреждает об этом явно в начале.
      Делает максимально осознанный разбор: что системно идёт не так, какой риск продолжать.
      Если провалится — готовит полный briefing для человека: все провалы, все гипотезы, рекомендация.
      Тон — граница между профессиональным и экзистенциальным.
